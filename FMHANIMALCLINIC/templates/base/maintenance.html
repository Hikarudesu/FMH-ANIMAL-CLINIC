<!-- prettier-ignore -->
{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maintenance - {{ clinic_name }}</title>
    <link
      rel="icon"
      type="image/png"
      href="{% static 'image/fmh-logo.png' %}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #009688 0%, #4db6ac 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }

      .maintenance-container {
        text-align: center;
        max-width: 500px;
        padding: 40px 20px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .maintenance-icon {
        font-size: 4rem;
        color: #ff9800;
        margin-bottom: 20px;
      }

      .maintenance-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 20px;
      }

      .maintenance-message {
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 30px;
        opacity: 0.9;
      }

      .clinic-name {
        font-size: 1.2rem;
        font-weight: 600;
        margin-top: 30px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="maintenance-container">
      <div class="maintenance-icon">
        <i class='bx bx-wrench'></i>
      </div>
      <h1 class="maintenance-title">Under Maintenance</h1>
      <p class="maintenance-message">{{ maintenance_message }}</p>
      <div class="clinic-name">{{ clinic_name }}</div>
    </div>
  </body>
</html>
